# ── HTTP: redirect to HTTPS + certbot challenge ──────────────────────────────
server {
    listen 80;
    server_name wordofhopesc.com www.wordofhopesc.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://wordofhopesc.com$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name wordofhopesc.com www.wordofhopesc.com;

    ssl_certificate     /etc/letsencrypt/live/wordofhopesc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wordofhopesc.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # www → non-www redirect
    if ($host = www.wordofhopesc.com) {
        return 301 https://wordofhopesc.com$request_uri;
    }

    # Larger uploads (photos)
    client_max_body_size 20M;

    # Proxy to Next.js app
    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Cache static Next.js assets
    location /_next/static/ {
        proxy_pass http://app:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cache uploaded photos
    location /uploads/ {
        proxy_pass http://app:3000;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
