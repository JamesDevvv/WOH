# HTTP → HTTPS redirect + certbot challenge
server {
    listen 80;
    server_name wordofhopesc.com www.wordofhopesc.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://wordofhopesc.com$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name wordofhopesc.com www.wordofhopesc.com;

    ssl_certificate     /etc/letsencrypt/live/wordofhopesc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wordofhopesc.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    if ($host = www.wordofhopesc.com) {
        return 301 https://wordofhopesc.com$request_uri;
    }

    client_max_body_size 20M;

    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /_next/static/ {
        proxy_pass http://app:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /uploads/ {
        alias /var/www/uploads/;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
}
